<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 64" width="72" height="64">
  <!-- Row 1: narrow top of head -->
  <rect x="8"  y="0"  width="56" height="8" fill="#e8e8f0"/>
  <!-- Row 2-3: full head -->
  <rect x="0"  y="8"  width="72" height="8" fill="#e8e8f0"/>
  <rect x="0"  y="16" width="72" height="8" fill="#e8e8f0"/>
  <!-- Row 4: eyes -->
  <rect x="0"  y="24" width="72" height="8" fill="#e8e8f0"/>
  <rect x="12" y="24" width="16" height="8" fill="#1a1a2e"/>
  <rect x="44" y="24" width="16" height="8" fill="#1a1a2e"/>
  <!-- Row 5-7: body -->
  <rect x="0"  y="32" width="72" height="8" fill="#e8e8f0"/>
  <rect x="0"  y="40" width="72" height="8" fill="#e8e8f0"/>
  <rect x="0"  y="48" width="72" height="8" fill="#e8e8f0"/>
  <!-- Row 8: wavy bottom (3 bumps) -->
  <rect x="0"  y="56" width="16" height="8" fill="#e8e8f0"/>
  <rect x="32" y="56" width="16" height="8" fill="#e8e8f0"/>
  <rect x="56" y="56" width="16" height="8" fill="#e8e8f0"/>
</svg>
